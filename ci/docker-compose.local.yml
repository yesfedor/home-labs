version: '3.8'

services:
  # Expose ports directly for local debugging if needed
  # (NPM handles this in prod, but locally we might want direct access)
  # Using non-standard host ports to avoid conflicts with local DBs
  mariadb:
    ports:
      - "13306:3306"

  postgres:
    ports:
      - "15432:5432"

  redis:
    ports:
      - "16379:6379"
